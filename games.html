// गेम्स डिस्प्ले करें
function displayGames(category = 'all') {
    const container = document.getElementById('gamesContainer');
    container.innerHTML = '';
    
    const filteredGames = category === 'all' ? gamesData : gamesData.filter(game => game.category === category);
    
    filteredGames.forEach(game => {
        const gameCard = `
            <div class="col-lg-4 col-md-6 mb-4">
                <div class="game-card" data-category="${game.category}">
                    <img src="images/games/${game.image}" alt="${game.name}" class="img-fluid">
                    <div class="game-overlay">
                        <h3>${game.name}</h3>
                        <p><i class="fas fa-users"></i> ${game.players} खिलाड़ी</p>
                        <div class="popularity">
                            <div class="progress">
                                <div class="progress-bar bg-warning" style="width: ${game.popularity}%"></div>
                            </div>
                            <span>${game.popularity}% लोकप्रिय</span>
                        </div>
                        <a href="${game.link}" class="btn btn-play mt-3">खेलें <i class="fas fa-play"></i></a>
                    </div>
                </div>
            </div>
        `;
        container.innerHTML += gameCard;
    });
}

// फिल्टर फंक्शन
function filterGames(category) {
    // Active class update
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    event.target.classList.add('active');
    
    // Filter games
    displayGames(category);
}

// पेज लोड होने पर सभी गेम्स दिखाएं
document.addEventListener('DOMContentLoaded', () => {
    displayGames('all');
});
</script>

<style>
.games-header {
    background: linear-gradient(135deg, var(--primary-black), var(--secondary-black));
    border-bottom: 1px solid var(--primary-gold);
}

.category-filters {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

.filter-btn {
    background: transparent;
    border: 2px solid var(--primary-gold);
    color: var(--primary-gold);
    padding: 10px 25px;
    border-radius: 30px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
}

.filter-btn:hover,
.filter-btn.active {
    background: var(--primary-gold);
    color: var(--primary-black);
    transform: translateY(-2px);
}

.game-card {
    position: relative;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition: all 0.3s;
    height: 250px;
}

.game-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 40px rgba(255,215,0,0.3);
}

.game-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: all 0.5s;
}

.game-card:hover img {
    transform: scale(1.1);
}

.game-overlay {
    position: absolute;

    left: 0;
    right: 0;

    background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.7));

    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    opacity: 0;
    transition: all 0.3s;
}

.game-card:hover .game-overlay {

}

.game-overlay h3 {
    color: var(--primary-gold);
    margin-bottom: 10px;

}

.game-overlay p {

}

.popularity {
    width: 100%;
    text-align: center;
}

.popularity .progress {
    height: 8px;

    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 5px;
}

.popularity span {
    color: var(--primary-gold);
    font-size: 14px;
}
</style>
